<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Transformation Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; font-family: Arial; }
#container { display:flex; height:100vh; }
#scene { flex:3; }
#controls {
  flex:1;
  padding:20px;
  background:#f5f5f5;
  overflow-y:auto;
}
h2 { margin-top:10px; }
button { margin-top:10px; padding:6px 12px; }
pre { background:white; padding:10px; font-size:12px; }
#history { font-size:12px; background:white; padding:10px; max-height:120px; overflow:auto; }
</style>
</head>

<body>

<div id="container">

<div id="scene"></div>

<div id="controls">

<h2>Translation</h2>
X <input type="range" id="tx" min="-5" max="5" step="0.1" value="0"><br>
Y <input type="range" id="ty" min="-5" max="5" step="0.1" value="0"><br>
Z <input type="range" id="tz" min="-5" max="5" step="0.1" value="0"><br>

<h2>Rotation</h2>
X <input type="range" id="rx" min="0" max="360" value="0"><br>
Y <input type="range" id="ry" min="0" max="360" value="0"><br>
Z <input type="range" id="rz" min="0" max="360" value="0"><br>

<br>
<label><input type="checkbox" checked onchange="toggleAxes(this.checked)"> Show Axes</label><br>
<label><input type="checkbox" checked onchange="toggleBreakdown(this.checked)"> Show Matrix Breakdown</label>

<br><br>
<button onclick="resetObject()">Reset</button>

<h3>Transformation Matrix</h3>
<pre id="matrixDisplay"></pre>

<h3>Transformation History</h3>
<div id="history"></div>

</div>
</div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth * 0.75, window.innerHeight);
document.getElementById("scene").appendChild(renderer.domElement);

// MAIN CUBE (transformed)
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshNormalMaterial();
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// GHOST ORIGINAL CUBE
const ghostMaterial = new THREE.MeshBasicMaterial({
  color:0x888888,
  transparent:true,
  opacity:0.3,
  wireframe:false
});
const ghostCube = new THREE.Mesh(geometry, ghostMaterial);
scene.add(ghostCube);

// AXES
const axesHelper = new THREE.AxesHelper(5);
scene.add(axesHelper);

camera.position.set(4,4,6);
camera.lookAt(0,0,0);

let showBreakdown = true;

function updateTransformation() {
  const tx = parseFloat(txInput.value);
  const ty = parseFloat(tyInput.value);
  const tz = parseFloat(tzInput.value);

  const rx = THREE.MathUtils.degToRad(parseFloat(rxInput.value));
  const ry = THREE.MathUtils.degToRad(parseFloat(ryInput.value));
  const rz = THREE.MathUtils.degToRad(parseFloat(rzInput.value));

  cube.position.set(tx, ty, tz);
  cube.rotation.set(rx, ry, rz);

  cube.updateMatrix();
  displayMatrix(cube.matrix.elements);
  logTransformation(tx, ty, tz, rxInput.value, ryInput.value, rzInput.value);
}

function displayMatrix(m) {
  let matrixText = "";

  for (let i = 0; i < 4; i++) {
    matrixText +=
      m[i].toFixed(2) + "   " +
      m[i+4].toFixed(2) + "   " +
      m[i+8].toFixed(2) + "   " +
      m[i+12].toFixed(2) + "\n";
  }

  if (showBreakdown) {
    matrixText += "\nMatrix Breakdown:\n";
    matrixText += "Row 1 → X transformation\n";
    matrixText += "Row 2 → Y transformation\n";
    matrixText += "Row 3 → Z transformation\n";
    matrixText += "Column 4 → Translation components\n";
  }

  matrixDisplay.textContent = matrixText;
}

function resetObject() {
  txInput.value = 0;
  tyInput.value = 0;
  tzInput.value = 0;
  rxInput.value = 0;
  ryInput.value = 0;
  rzInput.value = 0;

  cube.position.set(0,0,0);
  cube.rotation.set(0,0,0);
  cube.scale.set(1,1,1);

  historyDiv.innerHTML = "";
  updateTransformation();
}

function toggleAxes(state) {
  axesHelper.visible = state;
}

function toggleBreakdown(state) {
  showBreakdown = state;
  updateTransformation();
}

function logTransformation(tx, ty, tz, rx, ry, rz) {
  const entry = document.createElement("div");
  entry.textContent =
    `T(${tx}, ${ty}, ${tz})  R(${rx}°, ${ry}°, ${rz}°)`;
  historyDiv.appendChild(entry);
}

// ELEMENT REFERENCES
const txInput = document.getElementById("tx");
const tyInput = document.getElementById("ty");
const tzInput = document.getElementById("tz");
const rxInput = document.getElementById("rx");
const ryInput = document.getElementById("ry");
const rzInput = document.getElementById("rz");
const matrixDisplay = document.getElementById("matrixDisplay");
const historyDiv = document.getElementById("history");

// EVENTS
txInput.addEventListener("input", updateTransformation);
tyInput.addEventListener("input", updateTransformation);
tzInput.addEventListener("input", updateTransformation);
rxInput.addEventListener("input", updateTransformation);
ryInput.addEventListener("input", updateTransformation);
rzInput.addEventListener("input", updateTransformation);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
updateTransformation();
</script>

</body>
</html>
